<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Europcar | Análisis 2026</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
        .header { grid-column: 1 / span 2; background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 5px solid #008542; display: flex; justify-content: space-between; align-items: center; }
        .logo-europcar { background: #008542; color: white; padding: 8px 25px; border-radius: 6px; font-weight: 900; letter-spacing: 1px; font-size: 18px; }
        .main-content { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #008542; color: white; padding: 12px; text-align: left; font-size: 13px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .sidebar { background: #008542; color: white; padding: 25px; border-radius: 15px; height: fit-content; position: sticky; top: 20px; }
        .stat-card { background: rgba(255,255,255,0.15); margin-bottom: 10px; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .stat-number { font-size: 22px; font-weight: bold; }
        .total-card { background: white; color: #008542; margin-top: 15px; font-weight: bold; }
        .analysis-box { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 15px; margin-top: 20px; }
        .analysis-item { display: flex; justify-content: space-between; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 5px 0; }
        .tag { padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .tag-requirement { background: #e3f2fd; color: #1976d2; }
        .tag-complaint { background: #ffebee; color: #c62828; }
        .tag-congrats { background: #e8f5e9; color: #2e7d32; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; color: #008542; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size: 24px; color: #333;">ANÁLISIS DE CASOS AÑO 2026</h1>
        <div class="logo-europcar">EUROPCAR</div>
    </div>

    <div class="main-content">
        <table id="tablaDatos">
            <thead>
                <tr>
                    <th>Mes</th>
                    <th>Booking</th>
                    <th>Nombre</th>
                    <th>Tipo</th>
                    <th>Descripción</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>

    <aside class="sidebar">
        <h3>Filtrar por Mes</h3>
        <select id="filtroMes" onchange="renderizar()"></select>

        <h3>Resumen Mensual</h3>
        <div class="stat-card"><span>Requirements</span><span id="count-req" class="stat-number">0</span></div>
        <div class="stat-card"><span>Complaints</span><span id="count-comp" class="stat-number">0</span></div>
        <div class="stat-card"><span>Congrats</span><span id="count-cong" class="stat-number">0</span></div>
        <div class="stat-card total-card"><span>TOTAL CASOS</span><span id="count-total" class="stat-number">0</span></div>

        <div class="analysis-box">
            <h4 style="margin-top:0; border-bottom: 1px solid white; padding-bottom: 5px;">Top Motivos Quejas</h4>
            <div id="motivos-list"></div>
        </div>
    </aside>
</div>

<script>
    const URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSzC5OL79p1MJZoel12enc4w9G12hbsd_qICkbeE7N-pDdLqCh2gEuuwc3NbaI_820chNyjcifqVdJj/pub?gid=0&single=true&output=csv';
    let database = [];

    function splitCSV(row) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let char of row) {
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) {
                result.push(current.trim());
                current = '';
            } else current += char;
        }
        result.push(current.trim());
        return result;
    }

    async function cargar() {
        try {
            const res = await fetch(`${URL}&t=${Date.now()}`);
            const csv = await res.text();
            const filas = csv.split(/\r?\n/).filter(f => f.trim() !== "");
            
            // Limpiar encabezados y encontrar índices exactos
            const encabezados = splitCSV(filas[0]).map(h => h.toUpperCase().replace(/"/g, '').trim());
            
            const iMes = encabezados.indexOf("MONTH");
            const iBook = encabezados.indexOf("BOOKING NUMBER");
            const iName = encabezados.indexOf("NAME");
            const iType = encabezados.indexOf("TYPE OF REQUIREMENT");
            const iDesc = encabezados.indexOf("DESCRIPTION");

            database = filas.slice(1).map(f => {
                const c = splitCSV(f);
                const cl = (idx) => (c[idx] || "").replace(/^"|"$/g, '').trim();
                return {
                    mes: cl(iMes),
                    book: cl(iBook),
                    name: cl(iName),
                    type: cl(iType),
                    desc: cl(iDesc)
                };
            }).filter(d => d.mes && d.mes !== "" && d.mes !== "MONTH");

            // Crear lista de meses única para el selector
            const select = document.getElementById('filtroMes');
            const mesesValidos = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
            const mesesEncontrados = [...new Set(database.map(d => d.mes.toUpperCase()))]
                                     .filter(m => mesesValidos.includes(m));
            
            select.innerHTML = '<option value="TODOS">TODO EL AÑO</option>';
            mesesEncontrados.sort((a, b) => mesesValidos.indexOf(a) - mesesValidos.indexOf(b)).forEach(m => {
                const opt = document.createElement('option');
                opt.value = m; opt.innerText = m;
                select.appendChild(opt);
            });

            renderizar();
        } catch (e) { console.error("Error cargando datos:", e); }
    }

    function renderizar() {
        const filtro = document.getElementById('filtroMes').value;
        const cuerpo = document.getElementById('cuerpoTabla');
        const motivosDiv = document.getElementById('motivos-list');
        cuerpo.innerHTML = "";
        motivosDiv.innerHTML = "";
        
        let c = { req: 0, comp: 0, cong: 0 };
        let motivos = {};

        database.forEach(d => {
            if (filtro === "TODOS" || d.mes.toUpperCase() === filtro) {
                const t = (d.type || "").toUpperCase();
                let cls = "tag-requirement";
                
                if (t.includes("COMPLAINT")) { 
                    c.comp++; 
                    cls = "tag-complaint";
                    const desc = d.desc || "Sin descripción";
                    motivos[desc] = (motivos[desc] || 0) + 1;
                }
                else if (t.includes("CONGRATS")) { c.cong++; cls = "tag-congrats"; }
                else if (t.includes("REQUIREMENT")) { c.req++; }

                cuerpo.innerHTML += `<tr>
                    <td>${d.mes}</td>
                    <td style="font-weight:bold; color:#008542">${d.book}</td>
                    <td>${d.name}</td>
                    <td><span class="tag ${cls}">${d.type || 'N/A'}</span></td>
                    <td>${d.desc || ''}</td>
                </tr>`;
            }
        });

        document.getElementById('count-req').innerText = c.req;
        document.getElementById('count-comp').innerText = c.comp;
        document.getElementById('count-cong').innerText = c.cong;
        document.getElementById('count-total').innerText = c.req + c.comp + c.cong;

        const sortedMotivos = Object.entries(motivos).sort((a,b) => b[1] - a[1]).slice(0, 5);
        if (sortedMotivos.length === 0) {
            motivosDiv.innerHTML = '<div style="font-size:11px; opacity:0.7;">No hay quejas.</div>';
        } else {
            sortedMotivos.forEach(([motivo, total]) => {
                motivosDiv.innerHTML += `<div class="analysis-item"><span>${motivo}</span><span style="font-weight:bold;">${total}</span></div>`;
            });
        }
    }
    window.onload = cargar;
</script>
</body>
</html>
